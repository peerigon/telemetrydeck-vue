name: Test and 🚀 Release

on:
  push:
    branches:
      - main

jobs:
  verify:
    uses: ./.github/workflows/verification.yml

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: verify

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Install deps and build (with cache)
        uses: bahmutov/npm-install@v1.12.1

      - name: 🚀 Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run release
